<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Byte-Size Fiction</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="window" id="js-win">

  <!-- Resize handles -->
  <div class="rh rh-e"  data-dir="e"></div>
  <div class="rh rh-s"  data-dir="s"></div>
  <div class="rh rh-se" data-dir="se"></div>

  <!-- Title bar -->
  <div class="titlebar" id="js-titlebar">

    <div class="titlebar-btns">
      <!-- Sidebar toggle -->
      <button class="tb-btn" id="js-btn-sidebar" title="Toggle sidebar">
        <svg viewBox="0 0 14 12">
          <rect x="0.6" y="0.6" width="12.8" height="10.8" rx="1.8"/>
          <line x1="4.5" y1="0.6" x2="4.5" y2="11.4"/>
        </svg>
      </button>
      <!-- Maximize / Restore -->
      <button class="tb-btn" id="js-btn-max" title="Maximize">
        <svg id="js-max-icon" viewBox="0 0 13 13">
          <polyline points="1,4.5 1,1 4.5,1"/>
          <polyline points="8.5,1 12,1 12,4.5"/>
          <polyline points="12,8.5 12,12 8.5,12"/>
          <polyline points="4.5,12 1,12 1,8.5"/>
        </svg>
      </button>
    </div>

    <div class="titlebar-center">
      <svg class="titlebar-icon" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1" width="9" height="12" rx="1.5" fill="#8E8E93" opacity="0.4"/>
        <rect x="5" y="3" width="9" height="12" rx="1.5" fill="#8E8E93"/>
        <rect x="7" y="6.5" width="5" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
        <rect x="7" y="9"   width="5" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
        <rect x="7" y="11.5" width="3" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
      </svg>
      <span class="titlebar-title" id="js-title">Byte-Size Fiction</span>
    </div>

  </div>

  <!-- Panes -->
  <div class="panes">

    <aside class="sidebar" id="js-sidebar">
      <div class="sidebar-section">
        <div class="section-label">Stories</div>
        <div id="js-tree"></div>
      </div>
    </aside>

    <main class="viewer">
      <div class="viewer-topbar" id="js-topbar" style="display:none">
        <div class="viewer-topbar-left">
          <span class="viewer-filename" id="js-fname"></span>
          <span class="viewer-ext">txt</span>
        </div>
        <span class="viewer-meta" id="js-meta"></span>
      </div>
      <div id="js-content">
        <div class="empty-state">
          <div class="empty-secondary">Old things. New things. Past things. Future things.</div>
          <div class="empty-secondary">Most of these were written a while ago and very, very quickly.</div>
          <div class="empty-secondary">Maybe more will be added. Maybe this is all we'll see.</div>
          <div class="empty-secondary">///////////////////</div>
        </div>
      </div>
    </main>

  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span class="status-item" id="js-status-left">18 stories</span>
    <span class="status-dot">·</span>
    <span class="status-item">8 poems</span>
    <span class="status-dot">·</span>
    <span class="status-item">Hamid Yuksel</span>
  </div>

</div>

<script src="main.js"></script>
</body>
</html>
