<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>flash txt fiction</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --accent-sel:  #0063D1;
      --text-1:      #1C1C1E;
      --text-2:      #636366;
      --text-3:      #AEAEB2;
      --text-4:      #C7C7CC;
      --sep:         rgba(0,0,0,0.10);
      --sep-strong:  rgba(0,0,0,0.16);
      --sidebar-bg:  rgba(242,242,247,0.92);
      --titlebar-bg: rgba(235,235,235,0.97);
      --content-bg:  #FFFFFF;
      --row-hover:   rgba(0,0,0,0.045);
      --shadow:      0 24px 80px rgba(0,0,0,0.22), 0 6px 18px rgba(0,0,0,0.12),
                     inset 0 0 0 0.5px rgba(255,255,255,0.5);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Helvetica Neue', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      background: #D4D4D4;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* ─── Window ──────────────────────────────────────────────── */
    .window {
      /* size set by JS on init */
      display: flex;
      flex-direction: column;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
      border: 0.5px solid rgba(0,0,0,0.22);
      position: relative; /* needed for resize handles */
    }

    /* ─── Resize handles ──────────────────────────────────────── */
    .rh {
      position: absolute;
      z-index: 500;
    }
    /* east */
    .rh-e  { right: 0;  top: 8px; bottom: 8px; width: 5px;  cursor: ew-resize; }
    /* south */
    .rh-s  { bottom: 0; left: 8px; right: 8px;  height: 5px; cursor: ns-resize; }
    /* south-east corner */
    .rh-se { right: 0;  bottom: 0; width: 16px;  height: 16px; cursor: nwse-resize; }

    /* ─── Title bar ───────────────────────────────────────────── */
    .titlebar {
      height: 48px;
      background: var(--titlebar-bg);
      display: flex;
      align-items: center;
      padding: 0 10px 0 10px;
      border-bottom: 0.5px solid var(--sep-strong);
      flex-shrink: 0;
      position: relative;
      -webkit-user-select: none;
      user-select: none;
      cursor: grab;
    }

    .titlebar:active { cursor: grabbing; }

    /* titlebar buttons — left side */
    .titlebar-btns {
      display: flex;
      align-items: center;
      gap: 2px;
      flex-shrink: 0;
      z-index: 1;
    }

    .tb-btn {
      width: 28px;
      height: 24px;
      background: none;
      border: none;
      border-radius: 6px;
      cursor: default;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-3);
      transition: background 0.08s, color 0.08s;
      flex-shrink: 0;
    }

    .tb-btn:hover {
      background: rgba(0,0,0,0.07);
      color: var(--text-1);
    }

    .tb-btn svg {
      width: 13px;
      height: 13px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
      stroke-linecap: round;
      stroke-linejoin: round;
      display: block;
    }

    .titlebar-center {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 6px;
      pointer-events: none;
    }

    .titlebar-icon {
      width: 15px;
      height: 15px;
      opacity: 0.45;
      flex-shrink: 0;
    }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.15px;
      max-width: 460px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ─── Panes ───────────────────────────────────────────────── */
    .panes {
      display: flex;
      flex: 1;
      min-height: 0;
    }

    /* ─── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: 218px;
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 0.5px solid var(--sep-strong);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      overflow-x: hidden;
      transition: width 0.2s cubic-bezier(0.4,0,0.2,1),
                  border-right-width 0.2s;
    }

    .sidebar.collapsed {
      width: 0;
      border-right-width: 0;
    }

    .sidebar::-webkit-scrollbar { width: 0; }

    .sidebar-section { padding: 16px 0 8px; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 0 18px 5px;
      white-space: nowrap;
    }

    /* file row */
    .row {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 3px 10px 3px 14px;
      margin: 0 5px;
      border-radius: 7px;
      cursor: default;
      min-height: 27px;
      transition: background 0.08s;
      white-space: nowrap;
    }

    .row:hover         { background: var(--row-hover); }
    .row.active        { background: var(--accent-sel); }
    .row.active .row-name,
    .row.active .row-icon { color: #fff; }

    .row-icon {
      font-size: 14px;
      line-height: 1;
      width: 17px;
      text-align: center;
      flex-shrink: 0;
      color: var(--text-2);
    }

    .row-name {
      font-size: 12.5px;
      color: var(--text-1);
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1;
    }

    /* folder */
    .folder-header {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px 3px 10px;
      margin: 0 5px;
      border-radius: 7px;
      cursor: default;
      min-height: 27px;
      transition: background 0.08s;
    }

    .folder-header:hover { background: var(--row-hover); }

    .chevron {
      width: 13px;
      height: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.14s ease;
    }

    .chevron svg {
      width: 8px;
      height: 8px;
      fill: none;
      stroke: var(--text-3);
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .chevron.open { transform: rotate(90deg); }

    .folder-children {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.22s cubic-bezier(0.4,0,0.2,1);
    }

    .folder-children .row { padding-left: 30px; }

    /* ─── Viewer ──────────────────────────────────────────────── */
    .viewer {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--content-bg);
      min-width: 0;
    }

    .viewer-topbar {
      height: 36px;
      flex-shrink: 0;
      border-bottom: 0.5px solid var(--sep);
      display: flex;
      align-items: center;
      padding: 0 20px;
      justify-content: space-between;
      background: #FAFAFA;
    }

    .viewer-topbar-left {
      display: flex;
      align-items: center;
      gap: 6px;
      min-width: 0;
    }

    .viewer-filename {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-1);
      letter-spacing: -0.1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .viewer-ext {
      font-size: 10.5px;
      color: var(--text-3);
      font-weight: 500;
      background: #EFEFEF;
      padding: 1px 5px;
      border-radius: 4px;
      flex-shrink: 0;
    }

    .viewer-meta {
      font-size: 11px;
      color: var(--text-3);
      flex-shrink: 0;
    }

    #js-content {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    /* empty state */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      -webkit-user-select: none;
      user-select: none;
    }

    .empty-icon    { font-size: 40px; opacity: 0.28; line-height: 1; }
    .empty-primary { font-size: 13px; font-weight: 600; color: var(--text-3); }
    .empty-secondary { font-size: 11.5px; color: var(--text-4); }

    /* scrollable content area */
    .viewer-scroll {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 36px 48px 48px;
    }

    .viewer-scroll::-webkit-scrollbar { width: 7px; }
    .viewer-scroll::-webkit-scrollbar-track { background: transparent; }
    .viewer-scroll::-webkit-scrollbar-thumb {
      background: rgba(0,0,0,0.10);
      border-radius: 4px;
    }
    .viewer-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.18); }

    .story-text {
      font-family: 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 12.5px;
      line-height: 1.82;
      color: #2C2C2E;
      white-space: pre-wrap;
      word-break: break-word;
      tab-size: 4;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .story-text { animation: fadeUp 0.16s ease; }

    /* ─── Status bar ──────────────────────────────────────────── */
    .statusbar {
      height: 22px;
      background: var(--titlebar-bg);
      border-top: 0.5px solid var(--sep-strong);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      -webkit-user-select: none;
      user-select: none;
    }

    .status-item { font-size: 11px; color: var(--text-3); }
    .status-dot  { color: var(--text-4); }

    .loading-msg {
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 12px;
      color: var(--text-3);
      padding: 48px;
      animation: fadeUp 0.2s ease;
    }

    .error-msg {
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 12px;
      color: #FF3B30;
      padding: 48px;
      line-height: 1.8;
      white-space: pre;
    }
  </style>
</head>
<body>

<div class="window" id="js-win">

  <!-- Resize handles -->
  <div class="rh rh-e"  data-dir="e"></div>
  <div class="rh rh-s"  data-dir="s"></div>
  <div class="rh rh-se" data-dir="se"></div>

  <!-- Title bar -->
  <div class="titlebar" id="js-titlebar">

    <div class="titlebar-btns">
      <!-- Sidebar toggle -->
      <button class="tb-btn" id="js-btn-sidebar" title="Toggle sidebar">
        <svg viewBox="0 0 14 12">
          <rect x="0.6" y="0.6" width="12.8" height="10.8" rx="1.8"/>
          <line x1="4.5" y1="0.6" x2="4.5" y2="11.4"/>
        </svg>
      </button>
      <!-- Maximize / Restore -->
      <button class="tb-btn" id="js-btn-max" title="Maximize">
        <svg id="js-max-icon" viewBox="0 0 13 13">
          <polyline points="1,4.5 1,1 4.5,1"/>
          <polyline points="8.5,1 12,1 12,4.5"/>
          <polyline points="12,8.5 12,12 8.5,12"/>
          <polyline points="4.5,12 1,12 1,8.5"/>
        </svg>
      </button>
    </div>

    <div class="titlebar-center">
      <svg class="titlebar-icon" viewBox="0 0 16 16" fill="none">
        <rect x="2" y="1" width="9" height="12" rx="1.5" fill="#8E8E93" opacity="0.4"/>
        <rect x="5" y="3" width="9" height="12" rx="1.5" fill="#8E8E93"/>
        <rect x="7" y="6.5" width="5" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
        <rect x="7" y="9"   width="5" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
        <rect x="7" y="11.5" width="3" height="0.9" rx="0.45" fill="white" opacity="0.7"/>
      </svg>
      <span class="titlebar-title" id="js-title">flash txt fiction</span>
    </div>

  </div>

  <!-- Panes -->
  <div class="panes">

    <aside class="sidebar" id="js-sidebar">
      <div class="sidebar-section">
        <div class="section-label">Stories</div>
        <div id="js-tree"></div>
      </div>
    </aside>

    <main class="viewer">
      <div class="viewer-topbar" id="js-topbar" style="display:none">
        <div class="viewer-topbar-left">
          <span class="viewer-filename" id="js-fname"></span>
          <span class="viewer-ext">txt</span>
        </div>
        <span class="viewer-meta" id="js-meta"></span>
      </div>
      <div id="js-content">
        <div class="empty-state">
          <div class="empty-primary">flash txt fiction</div>
          <div class="empty-secondary">Old things. New things. Past things. Future things.</div>
          <div class="empty-secondary">Most of these were written a while ago and very, very quickly.</div>
          <div class="empty-secondary">Maybe more will be added. Maybe this is all we'll see.</div>
          <div class="empty-secondary">///////////////////</div>
        </div>
      </div>
    </main>

  </div>

  <!-- Status bar -->
  <div class="statusbar">
    <span class="status-item" id="js-status-left">18 stories</span>
    <span class="status-dot">·</span>
    <span class="status-item">8 poems</span>
    <span class="status-dot">·</span>
    <span class="status-item">Hamid Yuksel</span>
  </div>

</div>

<script>
  // ─── File tree ────────────────────────────────────────────────
  const TREE = [
    { name: "100daystodie.txt" },
    { name: "bullit.txt" },
    { name: "cactus-cereal.txt" },
    // { name: "Capria.txt" },
    { name: "Chimera.txt" },
    { name: "convergence.txt" },
    { name: "DANWORKS STEELPIPE MERRYTIME.txt" },
    { name: "Dreams of a Monster.txt" },
    { name: "In Spite of the Blade.txt" },
    { name: "Lost Loop.txt" },
    // { name: "MARTIAN WAR.txt" },
    { name: "messages.txt" },
    { name: "motivational.txt" },
    // { name: "MYDAY=-A.txt" },
    { name: "San Fernando .txt" },
    { name: "sublime-journey.txt" },
    { name: "The Last Accident that caused the end of everything.txt" },
    { name: "The Last King Balthazar.txt" },
    {
      name: "bit::poetry",
      folder: true,
      children: [
        { name: "delot.txt" },
        { name: "HUSTLE.txt" },
        { name: "mile.txt" },
        { name: "SIGNALLOST.txt" },
        { name: "TETRIFIED.txt" },
        { name: "tetre.txt" },
        { name: "understanding the machine.txt" },
        { name: "visage.txt" },
      ]
    }
  ];

  // ─── Elements ─────────────────────────────────────────────────
  const win      = document.getElementById('js-win');
  const titlebar = document.getElementById('js-titlebar');
  const sidebar  = document.getElementById('js-sidebar');
  const btnSidebar = document.getElementById('js-btn-sidebar');
  const btnMax     = document.getElementById('js-btn-max');
  const maxIcon    = document.getElementById('js-max-icon');

  // ─── Window size init ─────────────────────────────────────────
  const MIN_W = 420, MIN_H = 300;
  let winW = Math.min(1080, window.innerWidth  - 48);
  let winH = Math.min(700,  window.innerHeight - 48);
  function applySize() {
    win.style.width  = winW + 'px';
    win.style.height = winH + 'px';
  }
  applySize();

  // ─── Drag ─────────────────────────────────────────────────────
  let tx = 0, ty = 0;
  let drag = null;

  titlebar.addEventListener('mousedown', (e) => {
    if (e.target.closest('.titlebar-btns')) return;
    if (isMaximized) return;
    drag = { startX: e.clientX, startY: e.clientY, tx, ty };
  });

  // ─── Resize ───────────────────────────────────────────────────
  let resizing = null;

  document.querySelectorAll('.rh').forEach(h => {
    h.addEventListener('mousedown', (e) => {
      e.stopPropagation();
      if (isMaximized) return;
      resizing = {
        dir: h.dataset.dir,
        startX: e.clientX,
        startY: e.clientY,
        startW: win.offsetWidth,
        startH: win.offsetHeight,
      };
      document.body.style.userSelect = 'none';
    });
  });

  // ─── Shared mousemove / mouseup ───────────────────────────────
  document.addEventListener('mousemove', (e) => {
    if (drag) {
      tx = drag.tx + (e.clientX - drag.startX);
      ty = drag.ty + (e.clientY - drag.startY);
      win.style.transform = `translate(${tx}px, ${ty}px)`;
    }
    if (resizing) {
      const dx = e.clientX - resizing.startX;
      const dy = e.clientY - resizing.startY;
      if (resizing.dir.includes('e')) {
        winW = Math.max(MIN_W, resizing.startW + dx);
        win.style.width = winW + 'px';
      }
      if (resizing.dir.includes('s')) {
        winH = Math.max(MIN_H, resizing.startH + dy);
        win.style.height = winH + 'px';
      }
    }
  });

  document.addEventListener('mouseup', () => {
    drag = null;
    if (resizing) {
      resizing = null;
      document.body.style.userSelect = '';
    }
  });

  // ─── Sidebar toggle ───────────────────────────────────────────
  let sidebarVisible = true;

  btnSidebar.addEventListener('mousedown', e => e.stopPropagation());
  btnSidebar.addEventListener('click', () => {
    sidebarVisible = !sidebarVisible;
    sidebar.classList.toggle('collapsed', !sidebarVisible);
    btnSidebar.style.color = sidebarVisible ? '' : 'var(--text-1)';
  });

  // ─── Maximize / Restore ───────────────────────────────────────
  let isMaximized = false;
  let savedW, savedH, savedTx, savedTy;

  const EXPAND_SVG = `<polyline points="1,4.5 1,1 4.5,1"/>
    <polyline points="8.5,1 12,1 12,4.5"/>
    <polyline points="12,8.5 12,12 8.5,12"/>
    <polyline points="4.5,12 1,12 1,8.5"/>`;

  const COMPRESS_SVG = `<polyline points="4.5,1 4.5,4.5 1,4.5"/>
    <polyline points="8.5,4.5 12,4.5 12,1"/>
    <polyline points="12,8.5 8.5,8.5 8.5,12"/>
    <polyline points="1,8.5 4.5,8.5 4.5,12"/>`;

  btnMax.addEventListener('mousedown', e => e.stopPropagation());
  btnMax.addEventListener('click', () => {
    if (!isMaximized) {
      savedW = winW; savedH = winH; savedTx = tx; savedTy = ty;
      winW = window.innerWidth  - 48;
      winH = window.innerHeight - 48;
      tx = 0; ty = 0;
      win.style.transform  = 'translate(0px, 0px)';
      win.style.borderRadius = '8px';
      applySize();
      maxIcon.innerHTML = COMPRESS_SVG;
      btnMax.title = 'Restore';
      isMaximized = true;
    } else {
      winW = savedW; winH = savedH; tx = savedTx; ty = savedTy;
      win.style.transform  = `translate(${tx}px, ${ty}px)`;
      win.style.borderRadius = '';
      applySize();
      maxIcon.innerHTML = EXPAND_SVG;
      btnMax.title = 'Maximize';
      isMaximized = false;
    }
  });

  // ─── Build sidebar tree ───────────────────────────────────────
  const folderState = {};

  function buildTree(items, prefix = '') {
    const frag = document.createDocumentFragment();
    for (const item of items) {
      if (item.folder) {
        const wrap = document.createElement('div');
        const hdr  = document.createElement('div');
        hdr.className = 'folder-header';
        hdr.innerHTML = `
          <div class="chevron" id="ch-${CSS.escape(item.name)}">
            <svg viewBox="0 0 8 8"><polyline points="2,1 6,4 2,7"/></svg>
          </div>
          <span class="row-icon">📁</span>
          <span class="row-name">${item.name}</span>`;

        const kids = document.createElement('div');
        kids.className = 'folder-children';
        kids.appendChild(buildTree(item.children, item.name + '/'));
        hdr.addEventListener('click', () => {
          folderState[item.name] = !folderState[item.name];
          const ch = document.getElementById('ch-' + CSS.escape(item.name));
          ch.classList.toggle('open', folderState[item.name]);
          kids.style.maxHeight = folderState[item.name]
            ? (kids.scrollHeight + 400) + 'px' : '0';
        });
        wrap.appendChild(hdr);
        wrap.appendChild(kids);
        frag.appendChild(wrap);
      } else {
        const path = prefix + item.name;
        const row  = document.createElement('div');
        row.className = 'row';
        row.dataset.path = path;
        row.innerHTML = `<span class="row-icon">📄</span>
                         <span class="row-name">${item.name}</span>`;
        row.addEventListener('click', () => openFile(path, item.name));
        frag.appendChild(row);
      }
    }
    return frag;
  }

  // ─── Open file ────────────────────────────────────────────────
  async function openFile(path, name) {

    document.querySelectorAll('.row').forEach(r => {
      r.classList.toggle('active', r.dataset.path === path);
    });

    const topbar = document.getElementById('js-topbar');
    topbar.style.display = 'flex';
    document.getElementById('js-fname').textContent = name.replace(/\.txt$/, '');
    document.getElementById('js-meta').textContent  = '';
    document.getElementById('js-title').textContent = name;

    const content = document.getElementById('js-content');
    content.innerHTML = '<div class="loading-msg">Loading…</div>';

    try {
      const encodedPath = path.split('/').map(encodeURIComponent).join('/');
      const res = await fetch(encodedPath);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();

      const scroll = document.createElement('div');
      scroll.className = 'viewer-scroll';
      const pre = document.createElement('pre');
      pre.className = 'story-text';
      pre.textContent = text;
      scroll.appendChild(pre);
      content.innerHTML = '';
      content.appendChild(scroll);

      const words = text.trim().split(/\s+/).filter(Boolean).length;
      const lines = text.split('\n').length;
      document.getElementById('js-meta').textContent =
        `${words.toLocaleString()} words · ${lines} lines`;
      document.getElementById('js-status-left').textContent = name;

    } catch {
      content.innerHTML = `<div class="error-msg">Could not load "${path}".\n\nServe this folder over HTTP to load files:\n\n    python3 -m http.server 8080\n\nThen open  http://localhost:8080</div>`;
    }
  }

  // ─── Init tree ────────────────────────────────────────────────
  document.getElementById('js-tree').appendChild(buildTree(TREE));
</script>

</body>
</html>
